<!-- Issue #2: Number learning section 1-20 -->
<div id="numbers-section" style="display:none;padding:20px">
  <h2 style="text-align:center;color:#ff6b9d;margin-bottom:20px">🔢 Numbers 1–20</h2>
  <div id="numbers-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px"></div>
  <script>
  (function(){
    const words = ['','one','two','three','four','five','six','seven','eight','nine','ten',
                   'eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty'];
    const emojis = ['','🍎','🍎🍎','🍎🍎🍎','⭐⭐⭐⭐','🌟🌟🌟🌟🌟','🌺🌺🌺🌺🌺🌺','🎈🎈🎈🎈🎈🎈🎈',
                    '🐝🐝🐝🐝🐝🐝🐝🐝','🦋🦋🦋🦋🦋🦋🦋🦋🦋','🎵🎵🎵🎵🎵🎵🎵🎵🎵🎵',
                    '⚡'.repeat(11),'🌈'.repeat(12),'🎉'.repeat(13),'🦄'.repeat(14),'🍭'.repeat(15),
                    '🌸'.repeat(16),'🎨'.repeat(17),'🚀'.repeat(18),'🌟'.repeat(19),'🏆'.repeat(20)];
    const grid = document.getElementById('numbers-grid');
    for(let n=1;n<=20;n++){
      const card = document.createElement('div');
      card.style.cssText='background:#fff;border-radius:16px;padding:14px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:transform .15s';
      card.innerHTML=`<div style="font-size:2.5rem;font-weight:900;color:#7c3aed">${n}</div>
        <div style="font-size:.85rem;font-weight:700;color:#374151;margin:4px 0">${words[n]}</div>
        <div style="font-size:.65rem;word-break:break-all;line-height:1.4;max-height:40px;overflow:hidden">${emojis[n]}</div>`;
      card.onclick=()=>{
        card.style.transform='scale(1.05)';
        setTimeout(()=>card.style.transform='scale(1)',200);
        if('speechSynthesis' in window){
          const u=new SpeechSynthesisUtterance(words[n]);u.lang='en-US';speechSynthesis.speak(u);
        }
      };
      grid.appendChild(card);
    }
  })();
  </script>
</div>
